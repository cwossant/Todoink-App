org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.workers.max=4
org.gradle.caching=true
org.gradle.vfs.watch=true

# Kotlin incremental compilation can break when sources live on a different drive
# than the project (e.g. PUB_CACHE on C: while project is on E:), causing slow
# non-incremental fallbacks and daemon errors.
kotlin.incremental=false
kotlin.incremental.android=false
kotlin.compiler.execution.strategy=in-process
android.useAndroidX=true
android.enableR8.fullMode=false
